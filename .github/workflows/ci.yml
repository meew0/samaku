name: CI

on:
  push:
    branches: [master]
  pull_request:

# Only keep the latest run per branch/PR; cancel superseded ones.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ffms2 MSVC release used for the Windows builds (see WINDOWS_BUILD.md).
  FFMS2_VERSION: "5.0"

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.profile }})
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        profile: [debug, release]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-linux-deps

      - name: Set up Windows dependencies
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-deps
        with:
          ffms2-version: ${{ env.FFMS2_VERSION }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: build-${{ matrix.profile }}

      - name: Build
        shell: bash
        run: cargo build --locked ${{ matrix.profile == 'release' && '--release' || '' }}

      # -- Linux AppImage (release builds on push only) ----------------------

      - name: Build AppImage
        if: matrix.profile == 'release' && runner.os == 'Linux' && github.event_name == 'push'
        env:
          SKIP_BUILD: "1"
        run: bash packaging/build-appimage.sh

      - name: Delete previous Linux artifact
        if: matrix.profile == 'release' && runner.os == 'Linux' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts?name=samaku-linux&per_page=100" \
            --jq '.artifacts[].id' \
            | xargs -r -I{} gh api --method DELETE \
                "repos/${{ github.repository }}/actions/artifacts/{}" \
            || true

      - name: Upload Linux AppImage
        if: matrix.profile == 'release' && runner.os == 'Linux' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: samaku-linux
          path: target/appimage/samaku-x86_64.AppImage
          retention-days: 7

      # -- Windows bundle (release builds on push only) ----------------------

      - name: Bundle Windows DLLs
        if: matrix.profile == 'release' && runner.os == 'Windows' && github.event_name == 'push'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "target\release\samaku.exe" dist

          # libass and its vcpkg dependencies (freetype, fribidi, harfbuzz, …)
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows\bin"
          Copy-Item "$vcpkg\*.dll" dist

          # ffms2 + the FFmpeg DLLs it ships with
          Copy-Item "deps\ffms2\lib\*.dll" dist

      - name: Delete previous Windows artifact
        if: matrix.profile == 'release' && runner.os == 'Windows' && github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts?name=samaku-windows&per_page=100" \
            --jq '.artifacts[].id' \
            | xargs -r -I{} gh api --method DELETE \
                "repos/${{ github.repository }}/actions/artifacts/{}" \
            || true

      - name: Upload Windows artifact
        if: matrix.profile == 'release' && runner.os == 'Windows' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: samaku-windows
          path: dist/
          retention-days: 7

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Linux dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-linux-deps

      - name: Set up Windows dependencies
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-windows-deps
        with:
          ffms2-version: ${{ env.FFMS2_VERSION }}

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: test

      - name: Run tests
        shell: bash
        run: cargo test --locked

  clippy:
    name: Clippy (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Linux dependencies
        uses: ./.github/actions/setup-linux-deps

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          cache-key: clippy

      - name: Run clippy
        # `-- -D warnings` denies lints only for samaku's own crates, not the
        # (potentially warning-emitting) dependency tree.
        run: cargo clippy --locked --all-targets -- -D warnings

  fmt:
    name: Rustfmt (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Formatting needs neither the native libraries nor a full build, so it
      # only sets up the toolchain.
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache-key: fmt

      - name: Check formatting
        run: cargo fmt --all --check
